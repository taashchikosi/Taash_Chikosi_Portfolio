services:
  app:
    build: .
    platform: linux/amd64   # EnergyPlus is x86_64-only; force amd64 on Apple Silicon
    # Serve the public FastAPI app (in-memory MCP + EnergyPlus run in-process). The
    # Dockerfile's default CMD (python -m mcp_server.server) is for standalone MCP;
    # `docker compose run app <cmd>` still overrides this for the capstone/verify scripts.
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"   # FastAPI (frontend: cd frontend && npm run dev → :3000)
    env_file: .env
    environment:
      DATABASE_URL: postgresql://retrofit:retrofit@db:5432/retrofitgpt
    volumes:
      - ./:/workspace
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: retrofit
      POSTGRES_PASSWORD: retrofit
      POSTGRES_DB: retrofitgpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retrofit"]
      interval: 5s
      retries: 10

  # Langfuse self-host is optional — default .env points at cloud.langfuse.com.
  # Uncomment to self-host (see https://langfuse.com/self-hosting):
  # langfuse:
  #   image: langfuse/langfuse:latest
  #   ports: ["3000:3000"]
  #   depends_on: [db]

volumes:
  pgdata:
