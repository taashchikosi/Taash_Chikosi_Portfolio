<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 816" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="816" fill="#0d1117"/>

  <!-- ===== spine edges ===== -->
  <g stroke="#8b949e" stroke-width="1.5" fill="none">
    <line x1="450" y1="126" x2="450" y2="172" marker-end="url(#arrow)"/>
    <line x1="450" y1="270" x2="450" y2="314" marker-end="url(#arrow)"/>
    <line x1="450" y1="400" x2="450" y2="444" marker-end="url(#arrow)"/>
    <line x1="450" y1="530" x2="450" y2="574" marker-end="url(#arrow)"/>
    <line x1="450" y1="660" x2="450" y2="704" marker-end="url(#arrow)"/>
  </g>
  <g font-size="12.5" fill="#8b949e" text-anchor="middle">
    <text x="450" y="158">plain-English question</text>
    <text x="450" y="300">question + relevant table names</text>
    <text x="450" y="430">draft SQL</text>
    <text x="450" y="560">approved, read-only query</text>
    <text x="450" y="690">result rows</text>
  </g>

  <!-- ===== return loop: Answer -> Owner (right) ===== -->
  <path d="M 760 748 H 826 V 84 H 762" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowTeal)"/>
  <text x="842" y="416" transform="rotate(90 842 416)" text-anchor="middle" font-size="12" fill="#2dd4bf">an answer the owner can trust</text>

  <!-- ===== nodes ===== -->
  <!-- owner -->
  <rect x="140" y="42" width="620" height="84" rx="14" fill="#13283f" stroke="#4c8dff" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-size="17" font-weight="600" fill="#dce9ff">&#128100; Shop owner &#8212; Margo web app</text>
  <text x="450" y="102" text-anchor="middle" font-size="13" font-style="italic" fill="#dce9ff" opacity="0.82">asks in plain English &#8212; no SQL, no menus</text>

  <!-- agent -->
  <rect x="140" y="172" width="620" height="98" rx="14" fill="#241a3d" stroke="#a371f7" stroke-width="2"/>
  <text x="450" y="206" text-anchor="middle" font-size="17" font-weight="600" fill="#ecdfff">&#129504; Margo agent &#8212; FastAPI</text>
  <text x="450" y="232" text-anchor="middle" font-size="13" font-style="italic" fill="#ecdfff" opacity="0.85">schema linking picks the relevant tables</text>
  <text x="450" y="254" text-anchor="middle" font-size="13" font-style="italic" fill="#ecdfff" opacity="0.85">so only column names &#8212; never the rows &#8212; reach the model</text>

  <!-- LLM -->
  <rect x="140" y="314" width="620" height="86" rx="14" fill="#1d2750" stroke="#7c8cf8" stroke-width="2"/>
  <text x="450" y="350" text-anchor="middle" font-size="17" font-weight="600" fill="#dfe4ff">&#9999;&#65039; Claude Sonnet 4.6 &#8212; writes the query</text>
  <text x="450" y="374" text-anchor="middle" font-size="13" font-style="italic" fill="#dfe4ff" opacity="0.85">drafts the SQL &#8212; it never sees or computes the numbers</text>

  <!-- safety -->
  <rect x="140" y="444" width="620" height="86" rx="14" fill="#3a2412" stroke="#f0883e" stroke-width="2"/>
  <text x="450" y="480" text-anchor="middle" font-size="17" font-weight="600" fill="#ffd9b3">&#128737;&#65039; Two safety boundaries</text>
  <text x="450" y="504" text-anchor="middle" font-size="13" font-style="italic" fill="#ffd9b3" opacity="0.9">AST allow-list (SELECT-only) &#183; least-privilege read-only role</text>

  <!-- data -->
  <rect x="140" y="574" width="620" height="86" rx="14" fill="#13301d" stroke="#3fb950" stroke-width="2"/>
  <text x="450" y="610" text-anchor="middle" font-size="17" font-weight="600" fill="#caf0d2">&#128421;&#65039; Shop data &#8212; the query runs</text>
  <text x="450" y="634" text-anchor="middle" font-size="13" font-style="italic" fill="#caf0d2" opacity="0.85">code does the math &#8212; deterministic, not the model</text>

  <!-- answer -->
  <rect x="140" y="704" width="620" height="86" rx="14" fill="#0f2b2a" stroke="#2dd4bf" stroke-width="2"/>
  <text x="450" y="740" text-anchor="middle" font-size="17" font-weight="600" fill="#ccfbf1">&#128202; Answer + chart + receipts</text>
  <text x="450" y="764" text-anchor="middle" font-size="13" font-style="italic" fill="#ccfbf1" opacity="0.85">every number opens to the real rows behind it &#183; traced in Langfuse</text>
</svg>
